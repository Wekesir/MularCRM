services:
  mysql:
    image: mysql:8.0
    container_name: omnicrm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omnicrm}
      MYSQL_USER: ${MYSQL_USER:-omnicrm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-omnicrm_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: omnicrm-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnicrm-backend
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-omnicrm}
      DB_PASSWORD: ${MYSQL_PASSWORD:-omnicrm_password}
      DB_NAME: ${MYSQL_DATABASE:-omnicrm}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-omnicrm-dev-jwt-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AUTH_SESSION_TIMEZONE: ${AUTH_SESSION_TIMEZONE:-Africa/Nairobi}
      REPORT_UNLOCK_SECRET: ${REPORT_UNLOCK_SECRET:-change-me-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      AUTH_DEV_OTP_EMAIL: ${AUTH_DEV_OTP_EMAIL:-}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnicrm-frontend
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
