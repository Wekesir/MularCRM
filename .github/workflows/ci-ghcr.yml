name: CI and GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Lint frontend (stub if no script)
        working-directory: frontend
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm ci
            npm run lint
          else
            echo "No lint script in frontend/package.json — skipping."
          fi

      - name: Lint backend (stub if no script)
        working-directory: backend
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            npm ci
            npm run lint
          else
            echo "No lint script in backend/package.json — skipping."
          fi

  build-and-push:
    name: Build and push images
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-render:
    name: Deploy to Render
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend image
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK is not set — skipping backend deploy."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="$(echo "${{ env.REGISTRY }}/${{ github.repository }}/backend:${SHORT_SHA}" | tr '[:upper:]' '[:lower:]')"
          ENCODED="$(IMAGE="$IMAGE" python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['IMAGE'], safe=''))")"
          SEPARATOR='&'
          case "$DEPLOY_HOOK" in
            *\?*) ;;
            *) SEPARATOR='?' ;;
          esac
          echo "Deploying ${IMAGE}"
          curl -fsS -X POST "${DEPLOY_HOOK}${SEPARATOR}imgURL=${ENCODED}"
          echo "Backend deploy triggered on Render."

      - name: Deploy frontend image
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK is not set — skipping frontend deploy."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="$(echo "${{ env.REGISTRY }}/${{ github.repository }}/frontend:${SHORT_SHA}" | tr '[:upper:]' '[:lower:]')"
          ENCODED="$(IMAGE="$IMAGE" python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['IMAGE'], safe=''))")"
          SEPARATOR='&'
          case "$DEPLOY_HOOK" in
            *\?*) ;;
            *) SEPARATOR='?' ;;
          esac
          echo "Deploying ${IMAGE}"
          curl -fsS -X POST "${DEPLOY_HOOK}${SEPARATOR}imgURL=${ENCODED}"
          echo "Frontend deploy triggered on Render."
